services:
  - type: web
    name: tacticaledge-api-dev
    runtime: node
    plan: starter
    rootDir: .
    healthCheckPath: /health
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter api build
    startCommand: pnpm --filter api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL_PRIMARY
        value: gemini-3-flash-preview
      - key: GEMINI_MODEL_FALLBACK
        value: gemini-2.5-flash
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
